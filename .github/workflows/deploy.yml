name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types:
      - lyrics-card-docs-updated
  schedule:
    - cron: "23 3 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout website
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Checkout lyrics-card-generator docs
        uses: actions/checkout@v4
        with:
          repository: Qrzzzz/lyrics-card-generator
          ref: main
          path: .external/lyrics-card-generator
          sparse-checkout: |
            docs
          sparse-checkout-cone-mode: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Import lyrics-card-generator docs
        run: npm run docs:import

      - name: Test and validate imported docs
        run: |
          npm run docs:test
          npm run docs:check

      - name: Build with VitePress
        run: npm run docs:build

      - name: Validate routes and Pages boundary
        run: npm run docs:check -- --dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
